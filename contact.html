    :root{--red:#E31837;--dark-bg:#111318;--card-bg:#1a1d24;--border:#2a2d36;--text:#e8eaf0;--text-muted:#8b8fa8;--black:#0a0a0a;}

    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:700;font-size:1.1rem;}
    .nav-logo span{color:var(--red);}
    .nav-links{display:flex;gap:1.5rem;align-items:center;}
    .nav-links a{color:#8b8fa8;text-decoration:none;font-size:0.9rem;}
    .nav-links a:hover{color:#fff;}
    .lang-switcher{display:flex;gap:4px;}
    .lang-btn{background:transparent;border:1px solid var(--border);color:#8b8fa8;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;}
    .lang-btn.active,.lang-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
    .hero{background:linear-gradient(135deg,#0a0a0a,#1a0510);padding:4rem 1.5rem;text-align:center;}
    .hero h1{font-size:clamp(2rem,5vw,3rem);font-weight:800;margin-bottom:1rem;}
    .hero h1 span{color:var(--red);}
    .hero p{color:var(--text-muted);max-width:600px;margin:0 auto;}
    .container{max-width:700px;margin:0 auto;padding:3rem 1.5rem;}
    .form-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;}
    .form-group{margin-bottom:1.5rem;}
    label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:0.5rem;}
    input,textarea,select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.75rem 1rem;font-size:0.95rem;font-family:inherit;transition:border-color 0.2s;}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--red);}
    textarea{min-height:140px;resize:vertical;}
    select option{background:#1a1d24;}
    .btn-submit{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:0.9rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
    .btn-submit:hover{background:#c01430;}
    .btn-submit:disabled{background:#555;cursor:not-allowed;}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem;}
    .contact-item{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;}
    .contact-item .icon{font-size:1.5rem;margin-bottom:0.5rem;}
    .contact-item h3{font-size:0.9rem;font-weight:700;margin-bottom:0.25rem;}
    .contact-item p{font-size:0.82rem;color:var(--text-muted);}
    .success-msg{display:none;background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.3);border-radius:8px;padding:1rem;text-align:center;color:#00c864;margin-top:1rem;}
    .error-msg{display:none;background:rgba(220,50,50,0.1);border:1px solid rgba(220,50,50,0.3);border-radius:8px;padding:1rem;text-align:center;color:#e05050;margin-top:1rem;}
    footer{background:var(--black);border-top:1px solid var(--border);padding:2rem 1.5rem;text-align:center;color:#444;font-size:0.8rem;}
    footer a{color:#555;}
    @media(max-width:600px){.contact-grid{grid-template-columns:1fr;}.nav-links .nav-text{display:none;}}

<script>

    lblName:'Name', lblEmail:'Email', lblSubject:'Subject', lblMessage:'Message',
    namePh:'Your name', msgPh:'Your message...',
    subjects:['General Inquiry','Copyright / DMCA','Collaboration','Content Correction','Other'],
    btn:'Send Message →',
    btnSending:'Sending...',
    success:'✅ Message sent! We\'ll get back to you within 48 hours.',

    note:'For official KOLEX agency inquiries, visit <a href="https://www.kolex.co.kr" target="_blank" rel="noopener" style="color:var(--red);">kolex.co.kr</a> or follow <a href="https://www.instagram.com/kolexent/" target="_blank" rel="noopener" style="color:var(--red);">@kolexent</a>.',

  },

    ci3t:'版權問題', ci3d:'DMCA請求迅速處理',
    ci4t:'合作', ci4d:'歡迎粉絲計畫',
    lblName:'姓名', lblEmail:'電子郵件', lblSubject:'問題類型', lblMessage:'訊息',
    namePh:'請輸入姓名', msgPh:'請輸入您的訊息...',
    subjects:['一般詢問','版權 / DMCA','合作提案','內容更正','其他'],
    btn:'發送訊息 →',
    btnSending:'發送中...',
    success:'✅ 訊息已送出！我們將在48小時內回覆您。',

    navMembers:'成員', navBlog:'部落格'
  }
};

const subjectValues = ['general','copyright','collab','correction','other'];

function setLang(lang) {
  localStorage.setItem('kolexLang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : lang;
  const t = T[lang];

  document.getElementById('heroTitle').innerHTML = t.title;
  document.getElementById('heroDesc').textContent = t.desc;
  document.getElementById('ci1title').textContent = t.ci1t;
  document.getElementById('ci1desc').textContent = t.ci1d;
  document.getElementById('ci2title').textContent = t.ci2t;
  document.getElementById('ci3title').textContent = t.ci3t;
  document.getElementById('ci3desc').textContent = t.ci3d;
  document.getElementById('ci4title').textContent = t.ci4t;
  document.getElementById('ci4desc').textContent = t.ci4d;
  document.getElementById('lblName').textContent = t.lblName;
  document.getElementById('lblEmail').textContent = t.lblEmail;
  document.getElementById('lblSubject').textContent = t.lblSubject;
  document.getElementById('lblMessage').textContent = t.lblMessage;
  document.getElementById('name').placeholder = t.namePh;
  document.getElementById('message').placeholder = t.msgPh;
  document.getElementById('btnSubmit').textContent = t.btn;
  document.getElementById('officialNote').innerHTML = t.note;
  document.getElementById('navMembers').textContent = t.navMembers;

  // Rebuild subject options
  const sel = document.getElementById('subject');
  sel.innerHTML = '';
  t.subjects.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = subjectValues[i];
    opt.textContent = label;
    sel.appendChild(opt);
  });

  // Active lang button
  const map = {ko:'KO',en:'EN',ja:'JP',zh:'繁中'};
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === map[lang]);
  });
}

async function handleSubmit(e) {
  e.preventDefault();
  const lang = localStorage.getItem('kolexLang') || 'ko';
  const t = T[lang];
  const btn = document.getElementById('btnSubmit');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = t.btnSending;
  successMsg.style.display = 'none';
  errorMsg.style.display = 'none';

  const formData = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    subject: document.getElementById('subject').value,
    message: document.getElementById('message').value,
    lang: lang,
    timestamp: new Date().toISOString()
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(formData)
    });
    if (res.ok) {
      successMsg.textContent = t.success;
      successMsg.style.display = 'block';
      document.getElementById('contactForm').reset();
      setLang(lang);
    } else {
      throw new Error('Server error');
    }
  } catch (err) {
    errorMsg.textContent = t.error;
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = t.btn;
  }
}

// Init on load
document.addEventListener('DOMContentLoaded', () => {
  const lang = localStorage.getItem('kolexLang') || 'ko';
  setLang(lang);
});
</script>
