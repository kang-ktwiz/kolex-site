        title:{ko:"일본 팬을 위한 KBO 치어리딩 가이드", en:"KBO Cheerleading: Guide for Japanese Fans", ja:"日本のファンのためのKBOチアリーディングガイド", zh:"給日本粉絲的KBO啦啦隊指南"},
        desc:{ko:"일본 팬이 알아야 할 모든 것", en:"What Japanese fans need to know", ja:"日本のファンが知っておくべきこと", zh:"日本粉絲必須了解的內容"} },
      { href:"posts/kbo-cheerleading-for-taiwanese-fans.html", img:"kim-gahyun.jpg", grad:"linear-gradient(145deg,#ff4fa0,#9333ea)", tag:"guide", icon:"🇹🇼", date:[2026,5,21], read:5,
        title:{ko:"대만 팬을 위한 한국 치어리딩 가이드", en:"Korean Cheerleading: Guide for Taiwanese Fans", ja:"台湾のファンのための韓国チアリーディングガイド", zh:"給台灣粉絲的韓國啦啦隊指南"},
        desc:{ko:"대만 팬을 위한 모든 정보", en:"Everything for Taiwanese fans", ja:"台湾のファンのための完全情報", zh:"台灣粉絲不可錯過的完整資訊"} },
      { href:"posts/kolex-2026-season-preview.html", img:"kim-haeri.jpg", grad:"linear-gradient(145deg,#E31837,#ff6b9d)", tag:"culture", icon:"⚡", date:[2026,5,20], read:4,
        title:{ko:"KOLEX 2026 시즌 미리보기", en:"KOLEX 2026 Season: What to Expect", ja:"KOLEX 2026シーズンプレビュー", zh:"KOLEX 2026賽季前瞻"},
        desc:{ko:"올해 풀가동되는 스쿼드", en:"The squad at full strength this year", ja:"今年は万全の布陣で登場", zh:"今年陣容全面到位"} }
    ];

    const TAG_ICONS = { profile:"⭐", culture:"🎉", history:"📖", guide:"📚", team:"👑", global:"🌏", season:"⚡" };

    // ===== STATE =====
    let currentLang = 'ko';
    let currentFilter = 'all';

    function renderPosts() {
      const t = i18n[currentLang] || i18n.ko;
      const grid = document.getElementById('blogGrid');
      const filtered = currentFilter === 'all' ? POSTS : POSTS.filter(p => p.tag === currentFilter);
      grid.innerHTML = filtered.map(p => {
        const icon = p.icon || TAG_ICONS[p.tag] || '';
        const label = t['tag_' + p.tag] || p.tag;
        const title = p.title[currentLang] || p.title.en;
        const desc = p.desc[currentLang] || p.desc.en;
        const dateStr = formatDate(p.date, currentLang);
        return `<a class="blog-card" href="${p.href}">
        <div class="card-img" style="background:${p.grad};">
          <img src="../images/${p.img}" alt="${title}" loading="lazy" onerror="this.style.display='none'" />
          <span class="card-tag tag-${p.tag}">${icon} ${label}</span>
        </div>
        <div class="card-body">
          <h2>${title}</h2>
          <p>${desc}</p>
          <div class="card-meta"><span>${dateStr}</span><span>${p.read}${t.read_suffix}</span></div>
        </div>
      </a>`;
      }).join('');
    }

    function filterPosts(tag, btn) {
      currentFilter = tag;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPosts();
    }

    function setLang(lang) {
      if (!i18n[lang]) return;
      currentLang = lang;
      try { localStorage.setItem('kolexLang', lang); } catch (e) {}
      const t = i18n[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
      document.documentElement.lang = lang;
      renderPosts();
    }

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { setLang(btn.getAttribute('data-lang')); });
    });

    let savedLang = 'ko';
    try { savedLang = localStorage.getItem('kolexLang') || 'ko'; } catch (e) {}
    setLang(savedLang);
  </script>
